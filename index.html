<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AsbirUI — the dependable, accessible foundation for React UIs. Own the code, ship faster. Built with React, TypeScript and Tailwind CSS."
    />
    <title>AsbirUI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      // No-flash theme: set .dark/.light + data-theme before first paint.
      // Also paint the canvas background INLINE here — the token CSS that sets
      // `body { background: var(--canvas) }` ships inside the JS bundle, so
      // without this the document paints its default white until the bundle
      // loads (a white→black flash in dark mode, most visible in the homepage
      // preview iframes which reload on every refresh). The "?t=" query lets an
      // embedding frame pin the theme regardless of stored value.
      (function () {
        var t;
        try {
          var q = new URLSearchParams(window.location.search).get("t");
          t = q === "light" || q === "dark" ? q : localStorage.getItem("asbir-theme");
          if (t !== "light" && t !== "dark")
            t = window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        } catch (e) {
          t = "dark";
        }
        var root = document.documentElement;
        root.classList.remove("light", "dark");
        root.classList.add(t);
        root.setAttribute("data-theme", t);
        // inline background so the first paint is already the right color
        var bg = t === "light" ? "#ffffff" : "#000000";
        root.style.background = bg;
        root.style.colorScheme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/dev/main.tsx"></script>
  </body>
</html>
